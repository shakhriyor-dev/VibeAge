<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker | U-Universe Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="title">Hayot Yo'li Tracker</h2>
            <div class="input-group">
               <label>Tug'ilgan sanangizni kiriting:</label>
               <div class="date-inputs">
                    <input type="number" id="day" placeholder="DD" 
                           oninput="limitLength(this, 2, 'month')" 
                           onkeydown="moveToNext(event, 'month')">
                           
                    <input type="number" id="month" placeholder="MM" 
                           oninput="limitLength(this, 2, 'year')" 
                           onkeydown="moveToNext(event, 'year')">
                           
                    <input type="number" id="year" placeholder="YYYY" 
                           oninput="limitLength(this, 4, null)" 
                           onkeydown="moveToNext(event, null)">
                </div>
           </div>
            <div id="resultBox" class="results" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span id="daysCounter">0</span>
                        <p>Yashagan kunlaringiz</p>
                    </div>
                    <div class="stat-card">
                        <span id="zodiacSign">...</span>
                        <p>Burjingiz</p>
                    </div>
                </div>

                <div class="next-birthday">
                    <p id="nextBDayText">Sana kiriting...</p>
                </div>

                <div class="live-counter">
                    <p>Hozirgacha: <span id="secondsLive">0</span> soniya o'tdi</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
